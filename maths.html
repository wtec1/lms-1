

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form 1 Mathematics Quiz - Simplifying Algebraic Expressions</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div class="max-w-5xl mx-auto py-8 px-4">

<div class="bg-white rounded-xl shadow-lg overflow-hidden">

<div class="bg-indigo-700 text-white p-6 text-center">
<h1 class="text-3xl font-bold">Form 1 Mathematics Quiz</h1>
<p class="mt-2 text-lg">Topic: Simplifying Algebraic Expressions</p>
</div>

<div id="quiz" class="p-8 space-y-8"></div>

<div class="text-center pb-8">
<button onclick="submitQuiz()"
class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-lg font-semibold">
Submit Quiz
</button>
</div>

<div id="result" class="hidden border-t bg-green-50 p-8"></div>

</div>

</div>

<script>

const questions=[

{
question:"1. Simplify: 3x + 5x",
options:["8","8x","15x","2x"],
answer:1
},

{
question:"2. Simplify: 10y − 4y",
options:["6","6y","14y","40y"],
answer:1
},

{
question:"3. Simplify: 7a + 2a − a",
options:["8a","9a","10a","6a"],
answer:0
},

{
question:"4. Simplify: 4m + 3 + 2m",
options:["6m + 3","9m","9m + 3","6m"],
answer:0
},

{
question:"5. Simplify: 5p − 2p + 6",
options:["3p","7p","3p + 6","5p + 6"],
answer:2
},

{
question:"6. Simplify: 9x − 3x + 2",
options:["6x","6x + 2","12x","8x + 2"],
answer:1
},

{
question:"7. Which terms are like terms?",
options:[
"3x and 3y",
"4a and 5a",
"2x and 2",
"x and y"
],
answer:1
},

{
question:"8. Simplify: 12b − 7b",
options:["5","5b","19b","84b"],
answer:1
},

{
question:"9. Simplify: x + x + x",
options:["x³","2x","3x","x²"],
answer:2
},

{
question:"10. Simplify: 8k + 5 − 3k",
options:["5k + 5","11k","5k","8k + 2"],
answer:0
},

{
question:"11. Simplify: 15n − 6n + 4",
options:["9n","9n + 4","21n","19n"],
answer:1
},

{
question:"12. Simplify: 2a + 4b + 3a",
options:["9ab","5a + 4b","5ab","6a + 4b"],
answer:1
},

{
question:"13. Simplify: 6x − x",
options:["5","5x","7x","6"],
answer:1
},

{
question:"14. Simplify: 2m + 5m + 3",
options:["10m","7m","7m + 3","5m + 3"],
answer:2
},

{
question:"15. Simplify: 9a − 2a + 4 − 1",
options:["7a + 3","11a + 3","7a + 5","6a + 3"],
answer:0
}

];

const quiz=document.getElementById("quiz");

questions.forEach((q,index)=>{

let html=`
<div class="bg-gray-50 border rounded-lg p-5">

<h2 class="font-semibold text-lg mb-4">${q.question}</h2>
`;

q.options.forEach((option,i)=>{

html+=`
<label class="block p-3 rounded hover:bg-indigo-50 cursor-pointer">

<input
type="radio"
name="q${index}"
value="${i}"
class="mr-2">

${option}

</label>
`;

});

html+=`<div id="feedback${index}" class="mt-3 font-medium"></div></div>`;

quiz.innerHTML+=html;

});

function submitQuiz(){

let score=0;

questions.forEach((q,index)=>{

const selected=document.querySelector(`input[name="q${index}"]:checked`);

const feedback=document.getElementById(`feedback${index}`);

if(selected){

if(Number(selected.value)===q.answer){

score++;

feedback.innerHTML="<span class='text-green-600'>✔ Correct</span>";

}else{

feedback.innerHTML=`<span class='text-red-600'>✘ Incorrect.<br><strong>Correct Answer:</strong> ${q.options[q.answer]}</span>`;

}

}else{

feedback.innerHTML=`<span class='text-red-600'>No answer selected.<br><strong>Correct Answer:</strong> ${q.options[q.answer]}</span>`;

}

});

const percent=((score/questions.length)*100).toFixed(1);

let grade="";

if(percent>=80){

grade="🏆 Excellent";

}else if(percent>=70){

grade="🥇 Very Good";

}else if(percent>=60){

grade="👍 Good";

}else if(percent>=50){

grade="✔ Pass";

}else{

grade="❌ Fail";

}

const result=document.getElementById("result");

result.classList.remove("hidden");

result.innerHTML=`

<h2 class="text-3xl font-bold text-center text-indigo-700">
Quiz Results
</h2>

<div class="text-center mt-6 space-y-3">

<p class="text-xl">
Score:
<strong>${score} / ${questions.length}</strong>
</p>

<p class="text-xl">
Percentage:
<strong>${percent}%</strong>
</p>

<p class="text-2xl font-bold">${grade}</p>

<button
onclick="location.reload()"
class="mt-5 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg">
Try Again
</button>

</div>
`;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
