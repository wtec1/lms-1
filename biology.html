
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biology Quiz - Investigative Techniques & Biological Drawing</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-5xl mx-auto py-8 px-4">

<div class="bg-white rounded-xl shadow-lg overflow-hidden">

<div class="bg-emerald-700 text-white text-center p-6">
<h1 class="text-3xl font-bold">Biology Quiz</h1>
<p class="mt-2 text-lg">Investigative Techniques & Drawing Biological Diagrams</p>
</div>

<div id="quiz" class="p-8 space-y-8"></div>

<div class="text-center pb-8">
<button onclick="submitQuiz()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-lg font-semibold">
Submit Quiz
</button>
</div>

<div id="result" class="hidden border-t bg-green-50 p-8"></div>

</div>

</div>

<script>

const questions=[

{
question:"1. What is the main purpose of safety rules in a biology laboratory?",
options:[
"To waste time",
"To prevent accidents",
"To increase homework",
"To decorate the laboratory"
],
answer:1
},

{
question:"2. Which of the following is an important laboratory safety measure?",
options:[
"Running in the laboratory",
"Wearing protective clothing",
"Eating during experiments",
"Playing with chemicals"
],
answer:1
},

{
question:"3. Which of the following is a risk factor in the laboratory?",
options:[
"Broken glass",
"Notebook",
"Chair",
"Pen"
],
answer:0
},

{
question:"4. What should you do immediately after a laboratory accident?",
options:[
"Hide it",
"Report it to the teacher",
"Leave the laboratory",
"Ignore it"
],
answer:1
},

{
question:"5. Which apparatus is used to observe tiny organisms?",
options:[
"Thermometer",
"Microscope",
"Balance",
"Beaker"
],
answer:1
},

{
question:"6. Which apparatus measures the volume of liquids?",
options:[
"Measuring cylinder",
"Ruler",
"Forceps",
"Scalpel"
],
answer:0
},

{
question:"7. Which apparatus is used to measure temperature?",
options:[
"Thermometer",
"Microscope",
"Balance",
"Dropper"
],
answer:0
},

{
question:"8. Which apparatus is used to hold specimens during dissection?",
options:[
"Forceps",
"Bunsen burner",
"Test tube",
"Watch glass"
],
answer:0
},

{
question:"9. A good biological diagram should be:",
options:[
"Neat and clearly labelled",
"Coloured with crayons",
"Very small",
"Shaded heavily"
],
answer:0
},

{
question:"10. Biological diagrams should be drawn using:",
options:[
"A sharp pencil",
"A coloured marker",
"A paint brush",
"A crayon"
],
answer:0
},

{
question:"11. Labels on biological diagrams should:",
options:[
"Cross each other",
"Be written neatly with straight lines",
"Be written inside the drawing",
"Be curved"
],
answer:1
},

{
question:"12. Before drawing a specimen, a learner should first:",
options:[
"Observe it carefully",
"Guess its shape",
"Colour it",
"Fold the paper"
],
answer:0
},

{
question:"13. Magnification is calculated by:",
options:[
"Drawing size ÷ Actual size",
"Actual size ÷ Drawing size",
"Drawing size × Actual size",
"Drawing size + Actual size"
],
answer:0
},

{
question:"14. If a drawing is 8 cm and the actual specimen is 2 cm, what is the magnification?",
options:[
"2×",
"3×",
"4×",
"6×"
],
answer:2
},

{
question:"15. Why is magnification important in biology?",
options:[
"To estimate the enlargement of a specimen",
"To colour diagrams",
"To identify chemicals",
"To measure temperature"
],
answer:0
}

];

const quiz=document.getElementById("quiz");

questions.forEach((q,index)=>{

let html=`<div class="bg-gray-50 border rounded-lg p-5">
<h2 class="font-semibold text-lg mb-4">${q.question}</h2>`;

q.options.forEach((option,i)=>{

html+=`
<label class="block p-3 rounded hover:bg-emerald-100 cursor-pointer">
<input type="radio" name="q${index}" value="${i}" class="mr-2">
${option}
</label>`;

});

html+=`<div id="feedback${index}" class="mt-3 font-medium"></div></div>`;

quiz.innerHTML+=html;

});

function submitQuiz(){

let score=0;

questions.forEach((q,index)=>{

const selected=document.querySelector(`input[name="q${index}"]:checked`);
const feedback=document.getElementById(`feedback${index}`);

if(selected){

if(Number(selected.value)===q.answer){

score++;
feedback.innerHTML="<span class='text-green-600'>✔ Correct</span>";

}else{

feedback.innerHTML=`<span class="text-red-600">✘ Incorrect.<br><strong>Correct Answer:</strong> ${q.options[q.answer]}</span>`;

}

}else{

feedback.innerHTML=`<span class="text-red-600">No answer selected.<br><strong>Correct Answer:</strong> ${q.options[q.answer]}</span>`;

}

});

const percent=((score/questions.length)*100).toFixed(1);

let grade="";

if(percent>=80) grade="🏆 Excellent";
else if(percent>=70) grade="🥇 Very Good";
else if(percent>=60) grade="👍 Good";
else if(percent>=50) grade="✔ Pass";
else grade="❌ Fail";

const result=document.getElementById("result");

result.classList.remove("hidden");

result.innerHTML=`
<h2 class="text-3xl font-bold text-center text-emerald-700">Quiz Results</h2>

<div class="text-center mt-6 space-y-3">

<p class="text-xl">Score: <strong>${score} / ${questions.length}</strong></p>

<p class="text-xl">Percentage: <strong>${percent}%</strong></p>

<p class="text-2xl font-bold">${grade}</p>

<button onclick="location.reload()" class="mt-5 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg">
Try Again
</button>

</div>`;

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
